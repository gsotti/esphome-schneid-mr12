<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" font-family="'Segoe UI', Arial, sans-serif" font-size="12">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2940"/>
      <stop offset="100%" style="stop-color:#172033"/>
    </linearGradient>
    <linearGradient id="hot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>
    <linearGradient id="cold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#48cae4"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <linearGradient id="hotPipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <linearGradient id="coldPipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0077b6"/>
      <stop offset="100%" style="stop-color:#48cae4"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#00c853"/>
    </linearGradient>
    <linearGradient id="solarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f"/>
      <stop offset="100%" style="stop-color:#ff8f00"/>
    </linearGradient>
    <linearGradient id="headerBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="50%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="innerShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <!-- Pipe arrows -->
    <marker id="arrowHot" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#ff6b35"/>
    </marker>
    <marker id="arrowCold" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#48cae4"/>
    </marker>

    <!-- Pump symbol -->
    <symbol id="pumpOn" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="16" fill="#00c853" stroke="#00e676" stroke-width="2" filter="url(#glow)"/>
      <path d="M10,18 L18,10 L26,18 L18,26 Z" fill="none" stroke="white" stroke-width="2"/>
      <circle cx="18" cy="18" r="5" fill="none" stroke="white" stroke-width="1.5"/>
    </symbol>
    <symbol id="pumpOff" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="16" fill="#37474f" stroke="#546e7a" stroke-width="2"/>
      <path d="M10,18 L18,10 L26,18 L18,26 Z" fill="none" stroke="#78909c" stroke-width="2"/>
      <circle cx="18" cy="18" r="5" fill="none" stroke="#78909c" stroke-width="1.5"/>
    </symbol>

    <!-- Animated dash for active pipes -->
    <style>
      @keyframes flowRight { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
      @keyframes flowLeft { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 24; } }
      @keyframes pulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
      .flow-right { animation: flowRight 1s linear infinite; }
      .flow-left { animation: flowLeft 1s linear infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1200" height="850" fill="url(#bg)" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="60" fill="#0d1321" rx="12"/>
  <rect x="0" y="30" width="1200" height="30" fill="#0d1321"/>
  <rect x="30" y="18" width="6" height="24" rx="3" fill="url(#headerBar)"/>
  <text x="50" y="38" font-size="22" font-weight="bold" fill="#e0e0e0">Schneid MR-12</text>
  <text x="250" y="38" font-size="14" fill="#78909c">Heizungsanlage</text>
  <text x="1170" y="32" text-anchor="end" font-size="11" fill="#546e7a">FW 1200</text>
  <text x="1170" y="48" text-anchor="end" font-size="10" fill="#37474f">Modbus 0x01 | 19200 Bd</text>

  <!-- ==================== OUTSIDE TEMPERATURE ==================== -->
  <rect x="30" y="80" width="170" height="110" rx="10" fill="url(#card)" filter="url(#shadow)" stroke="#263238" stroke-width="1"/>
  <text x="115" y="102" text-anchor="middle" font-size="11" fill="#90a4ae" font-weight="bold" letter-spacing="1">AUSSEN</text>
  <text x="115" y="140" text-anchor="middle" font-size="36" font-weight="bold" fill="#48cae4" filter="url(#glow)">6.9°</text>
  <text x="115" y="160" text-anchor="middle" font-size="11" fill="#546e7a">Mittel 7.0° | Langzeit --</text>
  <text x="115" y="178" text-anchor="middle" font-size="9" fill="#37474f">T6 (40600)</text>

  <!-- ==================== PRIMARY / HEAT EXCHANGER ==================== -->
  <rect x="230" y="80" width="220" height="180" rx="10" fill="url(#card)" filter="url(#shadow)" stroke="#263238" stroke-width="1"/>
  <rect x="230" y="80" width="220" height="28" rx="10" fill="#1b5e20" opacity="0.3"/>
  <rect x="230" y="98" width="220" height="10" fill="url(#card)"/>
  <circle cx="248" cy="94" r="5" fill="#4caf50" class="pulse"/>
  <text x="262" y="98" font-size="11" fill="#a5d6a7" font-weight="bold" letter-spacing="1">UEBERGABESTATION</text>
  <text x="440" y="98" text-anchor="end" font-size="10" fill="#4caf50" font-weight="bold">EIN</text>

  <!-- Heat exchanger icon -->
  <rect x="270" y="125" width="80" height="60" rx="6" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>
  <line x1="280" y1="135" x2="340" y2="135" stroke="#e63946" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="145" x2="340" y2="145" stroke="#e63946" stroke-width="2" opacity="0.4"/>
  <line x1="280" y1="155" x2="340" y2="155" stroke="#48cae4" stroke-width="2" opacity="0.4"/>
  <line x1="280" y1="165" x2="340" y2="165" stroke="#48cae4" stroke-width="2" opacity="0.6"/>
  <text x="310" y="180" text-anchor="middle" font-size="9" fill="#78909c">WT</text>

  <!-- Primary temps -->
  <text x="385" y="132" text-anchor="middle" font-size="9" fill="#78909c">RL Primaer (T7)</text>
  <rect x="362" y="136" width="72" height="24" rx="5" fill="#0077b6" filter="url(#innerShadow)"/>
  <text x="398" y="153" text-anchor="middle" font-size="14" font-weight="bold" fill="white">46.0°</text>

  <!-- VL Sekundär -->
  <text x="385" y="180" text-anchor="middle" font-size="9" fill="#78909c">VL Sekundaer (T8)</text>
  <rect x="362" y="184" width="72" height="24" rx="5" fill="#e63946" filter="url(#innerShadow)"/>
  <text x="398" y="201" text-anchor="middle" font-size="14" font-weight="bold" fill="white">56.8°</text>
  <text x="398" y="222" text-anchor="middle" font-size="9" fill="#546e7a">Soll: 55.5° | Max RL: 58.6°</text>

  <!-- Valve -->
  <rect x="270" y="200" width="70" height="38" rx="5" fill="#263238" stroke="#37474f" stroke-width="1"/>
  <text x="305" y="215" text-anchor="middle" font-size="9" fill="#78909c">Ventil</text>
  <text x="305" y="232" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff6b35">37%</text>

  <!-- ==================== DISTRIBUTION PIPES ==================== -->
  <!-- Vorlauf vertical (hot) -->
  <line x1="490" y1="195" x2="490" y2="460" stroke="#e63946" stroke-width="5" opacity="0.8"/>
  <line x1="490" y1="195" x2="490" y2="460" stroke="#ff6b35" stroke-width="3" stroke-dasharray="12,12" class="flow-right" opacity="0.5"/>

  <!-- Rücklauf vertical (cold) -->
  <line x1="540" y1="195" x2="540" y2="460" stroke="#0077b6" stroke-width="5" opacity="0.8"/>
  <line x1="540" y1="195" x2="540" y2="460" stroke="#48cae4" stroke-width="3" stroke-dasharray="12,12" class="flow-left" opacity="0.5"/>

  <!-- Pipe labels -->
  <text x="490" y="190" text-anchor="middle" font-size="8" fill="#e63946" font-weight="bold">VL</text>
  <text x="540" y="190" text-anchor="middle" font-size="8" fill="#48cae4" font-weight="bold">RL</text>


  <!-- ==================== HEIZKREIS 1 ==================== -->
  <rect x="590" y="80" width="580" height="105" rx="10" fill="url(#card)" filter="url(#shadow)" stroke="#263238" stroke-width="1"/>
  <!-- Status indicator - active -->
  <rect x="590" y="80" width="580" height="28" rx="10" fill="#1b5e20" opacity="0.3"/>
  <rect x="590" y="98" width="580" height="10" fill="url(#card)"/>
  <circle cx="608" cy="94" r="5" fill="#00e676" class="pulse"/>
  <text x="622" y="98" font-size="12" fill="#a5d6a7" font-weight="bold" letter-spacing="1">HEIZKREIS 1</text>
  <text x="780" y="98" font-size="10" fill="#66bb6a">Wahlschalter</text>
  <rect x="1100" y="85" width="55" height="18" rx="4" fill="#1b5e20"/>
  <text x="1128" y="98" text-anchor="middle" font-size="9" fill="#69f0ae" font-weight="bold">AKTIV</text>

  <!-- Pipes HK1 -->
  <line x1="490" y1="130" x2="640" y2="130" stroke="#e63946" stroke-width="3" opacity="0.8"/>
  <line x1="490" y1="130" x2="640" y2="130" stroke="#ff6b35" stroke-width="2" stroke-dasharray="8,8" class="flow-right" opacity="0.6"/>
  <line x1="640" y1="160" x2="540" y2="160" stroke="#0077b6" stroke-width="3" opacity="0.8"/>
  <line x1="640" y1="160" x2="540" y2="160" stroke="#48cae4" stroke-width="2" stroke-dasharray="8,8" class="flow-left" opacity="0.6"/>

  <!-- Mixer HK1 -->
  <rect x="648" y="118" width="65" height="28" rx="6" fill="#263238" stroke="#2e7d32" stroke-width="1"/>
  <text x="680" y="130" text-anchor="middle" font-size="8" fill="#78909c">MISCHER</text>
  <text x="680" y="142" text-anchor="middle" font-size="10" font-weight="bold" fill="#66bb6a">--</text>

  <!-- Pump HK1 -->
  <use href="#pumpOn" x="740" y="114" width="32" height="32"/>
  <text x="756" y="158" text-anchor="middle" font-size="9" fill="#00e676" font-weight="bold">ON</text>

  <!-- VL Temp HK1 -->
  <rect x="810" y="120" width="80" height="30" rx="6" fill="#1b3a1b" stroke="#2e7d32" stroke-width="1"/>
  <text x="850" y="132" text-anchor="middle" font-size="8" fill="#81c784">VORLAUF</text>
  <text x="850" y="146" text-anchor="middle" font-size="14" font-weight="bold" fill="#69f0ae">47.4°</text>

  <!-- Soll HK1 -->
  <rect x="910" y="120" width="80" height="30" rx="6" fill="#1b3a1b" stroke="#1b5e20" stroke-width="1"/>
  <text x="950" y="132" text-anchor="middle" font-size="8" fill="#66bb6a">SOLL</text>
  <text x="950" y="146" text-anchor="middle" font-size="14" font-weight="bold" fill="#a5d6a7">45.1°</text>

  <!-- Delta indicator -->
  <rect x="1010" y="120" width="60" height="30" rx="6" fill="#263238" stroke="#37474f" stroke-width="1"/>
  <text x="1040" y="132" text-anchor="middle" font-size="8" fill="#78909c">DELTA</text>
  <text x="1040" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">+2.3°</text>

  <!-- ==================== SPEICHER 1 ==================== -->
  <rect x="590" y="200" width="280" height="130" rx="10" fill="url(#card)" filter="url(#shadow)" stroke="#263238" stroke-width="1"/>
  <rect x="590" y="200" width="280" height="28" rx="10" fill="#880e4f" opacity="0.2"/>
  <rect x="590" y="218" width="280" height="10" fill="url(#card)"/>
  <circle cx="608" cy="214" r="5" fill="#546e7a"/>
  <text x="622" y="218" font-size="12" fill="#f48fb1" font-weight="bold" letter-spacing="1">SPEICHER 1</text>
  <rect x="805" y="205" width="50" height="18" rx="4" fill="#37474f"/>
  <text x="830" y="218" text-anchor="middle" font-size="9" fill="#78909c" font-weight="bold">AUS</text>

  <!-- Pipes Speicher -->
  <line x1="490" y1="255" x2="620" y2="255" stroke="#e63946" stroke-width="3" opacity="0.4"/>
  <line x1="620" y1="295" x2="540" y2="295" stroke="#0077b6" stroke-width="3" opacity="0.4"/>

  <!-- Pump Boiler -->
  <use href="#pumpOff" x="625" y="239" width="28" height="28"/>
  <text x="639" y="279" text-anchor="middle" font-size="9" fill="#546e7a">OFF</text>

  <!-- Tank visualization -->
  <rect x="690" y="235" width="55" height="80" rx="8" fill="#263238" stroke="#546e7a" stroke-width="1.5"/>
  <rect x="694" y="239" width="47" height="25" rx="4" fill="#e63946" opacity="0.3"/>
  <rect x="694" y="267" width="47" height="25" rx="4" fill="#0077b6" opacity="0.2"/>
  <rect x="694" y="295" width="47" height="16" rx="4" fill="#0d47a1" opacity="0.15"/>

  <!-- T9 oben -->
  <rect x="760" y="235" width="80" height="26" rx="5" fill="#4a1428" stroke="#880e4f" stroke-width="1"/>
  <text x="800" y="245" text-anchor="middle" font-size="8" fill="#f48fb1">T9 OBEN</text>
  <text x="800" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="#f8bbd0">55.9°</text>

  <!-- Boiler Soll -->
  <rect x="760" y="275" width="80" height="26" rx="5" fill="#263238" stroke="#37474f" stroke-width="1"/>
  <text x="800" y="285" text-anchor="middle" font-size="8" fill="#78909c">SOLL BOILER</text>
  <text x="800" y="298" text-anchor="middle" font-size="13" font-weight="bold" fill="#b0bec5">55°</text>

  <!-- ==================== BETRIEBSMODI ==================== -->
  <rect x="30" y="220" width="170" height="62" rx="10" fill="url(#card)" filter="url(#shadow)" stroke="#263238" stroke-width="1"/>
  <text x="115" y="242" text-anchor="middle" font-size="11" fill="#90a4ae" font-weight="bold" letter-spacing="1">BETRIEBSMODI</text>
  <text x="48" y="265" font-size="10" fill="#78909c">HK1:</text>
  <text x="85" y="265" font-size="10" fill="#b0bec5" font-weight="bold">5 Wahlschalter</text>

  <!-- ==================== SYSTEM STATUS BAR ==================== -->
  <rect x="30" y="600" width="1140" height="55" rx="10" fill="url(#card)" filter="url(#shadow)" stroke="#263238" stroke-width="1"/>

  <!-- ESP32 chip icon -->
  <rect x="50" y="612" width="32" height="32" rx="4" fill="#263238" stroke="#4caf50" stroke-width="1"/>
  <text x="66" y="625" text-anchor="middle" font-size="7" fill="#4caf50">ESP32</text>
  <text x="66" y="636" text-anchor="middle" font-size="6" fill="#4caf50">C3</text>

  <text x="95" y="622" font-size="11" fill="#b0bec5" font-weight="bold">schneid-mr12.local</text>
  <text x="95" y="640" font-size="10" fill="#546e7a">GPIO4=TX | GPIO3=RX | GPIO2=DE/RE | MAX485 | 19200 Baud | WiFi -73 dBm</text>

  <!-- Status dots -->
  <circle cx="900" cy="627" r="5" fill="#4caf50" class="pulse"/>
  <text x="912" y="631" font-size="10" fill="#81c784">Modbus OK</text>
  <circle cx="990" cy="627" r="5" fill="#4caf50" class="pulse"/>
  <text x="1002" y="631" font-size="10" fill="#81c784">WiFi OK</text>
  <text x="1100" y="645" text-anchor="end" font-size="9" fill="#37474f">ESPHome 2026.1.0</text>

  <!-- ==================== PIPE LABELS ON DISTRIBUTION ==================== -->
  <rect x="460" y="340" width="60" height="20" rx="4" fill="#1a1a2e" stroke="#e63946" stroke-width="1" opacity="0.8"/>
  <text x="490" y="354" text-anchor="middle" font-size="8" fill="#e63946">VORLAUF</text>
  <rect x="510" y="340" width="60" height="20" rx="4" fill="#1a1a2e" stroke="#48cae4" stroke-width="1" opacity="0.8"/>
  <text x="540" y="354" text-anchor="middle" font-size="8" fill="#48cae4">RUECKLAUF</text>
</svg>
