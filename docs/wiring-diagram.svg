<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560"
     font-family="'Segoe UI', Arial, sans-serif" font-size="12">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    <linearGradient id="module" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2d4a22"/>
      <stop offset="100%" stop-color="#1a2e14"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#4a3728"/>
      <stop offset="100%" stop-color="#2e2218"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#78909c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="52" fill="#0d1321" rx="12"/>
  <rect x="0" y="26" width="900" height="26" fill="#0d1321"/>
  <rect x="20" y="14" width="5" height="24" rx="2" fill="#e63946"/>
  <text x="34" y="33" font-size="16" font-weight="bold" fill="#e0e0e0">Schneid MR-12 – Wiring Diagram</text>
  <text x="878" y="24" text-anchor="end" font-size="9" fill="#546e7a">ESP32-C3 → MAX485 → RS485 → MR-12</text>
  <text x="878" y="38" text-anchor="end" font-size="9" fill="#37474f">Modbus RTU · 19200 Bd · 8N1</text>

  <!-- ══════════════════════ ESP32-C3 DevKitM-1 ══════════════════════ -->
  <!-- PCB board -->
  <rect x="60" y="90" width="190" height="380" rx="8" fill="#1a3a1a" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <!-- Board label -->
  <text x="155" y="110" text-anchor="middle" font-size="11" fill="#81c784" font-weight="bold" letter-spacing="1">ESP32-C3</text>
  <text x="155" y="124" text-anchor="middle" font-size="9"  fill="#4caf50">DevKitM-1</text>

  <!-- Chip -->
  <rect x="105" y="200" width="100" height="80" rx="4" fill="url(#chip)" stroke="#4a5568" stroke-width="1.5"/>
  <text x="155" y="238" text-anchor="middle" font-size="10" fill="#90a4ae" font-weight="bold">ESP32-C3</text>
  <text x="155" y="253" text-anchor="middle" font-size="8"  fill="#546e7a">RISC-V · WiFi</text>
  <text x="155" y="268" text-anchor="middle" font-size="8"  fill="#546e7a">BLE · 160 MHz</text>

  <!-- USB connector at top -->
  <rect x="135" y="90" width="40" height="14" rx="3" fill="#263238" stroke="#546e7a" stroke-width="1"/>
  <text x="155" y="101" text-anchor="middle" font-size="8" fill="#78909c">USB-C</text>

  <!-- Left pin headers (GPIO labels) -->
  <!-- Pin row left side -->
  <rect x="62" y="148" width="18" height="300" rx="2" fill="#263238" stroke="#37474f" stroke-width="1"/>

  <!-- Right pin headers -->
  <rect x="230" y="148" width="18" height="300" rx="2" fill="#263238" stroke="#37474f" stroke-width="1"/>

  <!-- Individual pins - left side (we care about GPIO2, GPIO3, GPIO4) -->
  <!-- GND -->
  <rect x="60" y="155" width="22" height="10" rx="1" fill="#37474f" stroke="#546e7a" stroke-width="0.5"/>
  <text x="58" y="163" text-anchor="end" font-size="8" fill="#78909c">GND</text>

  <!-- 5V -->
  <rect x="60" y="170" width="22" height="10" rx="1" fill="#b71c1c" stroke="#e53935" stroke-width="0.5"/>
  <text x="58" y="178" text-anchor="end" font-size="8" fill="#ef9a9a">5V</text>

  <!-- GPIO2 -->
  <rect x="60" y="300" width="22" height="10" rx="1" fill="#1565c0" stroke="#1e88e5" stroke-width="0.5"/>
  <text x="58" y="308" text-anchor="end" font-size="8" fill="#90caf9">GPIO2</text>
  <text x="58" y="318" text-anchor="end" font-size="7" fill="#546e7a">DE/RE</text>

  <!-- GPIO3 -->
  <rect x="60" y="335" width="22" height="10" rx="1" fill="#4a148c" stroke="#7b1fa2" stroke-width="0.5"/>
  <text x="58" y="343" text-anchor="end" font-size="8" fill="#ce93d8">GPIO3</text>
  <text x="58" y="353" text-anchor="end" font-size="7" fill="#546e7a">RX←</text>

  <!-- GPIO4 -->
  <rect x="60" y="370" width="22" height="10" rx="1" fill="#e65100" stroke="#fb8c00" stroke-width="0.5"/>
  <text x="58" y="378" text-anchor="end" font-size="8" fill="#ffcc80">GPIO4</text>
  <text x="58" y="388" text-anchor="end" font-size="7" fill="#546e7a">TX→</text>

  <!-- GND (bottom) -->
  <rect x="60" y="405" width="22" height="10" rx="1" fill="#37474f" stroke="#546e7a" stroke-width="0.5"/>
  <text x="58" y="413" text-anchor="end" font-size="8" fill="#78909c">GND</text>

  <!-- ══════════════════════ MAX485 Module ══════════════════════ -->
  <rect x="380" y="160" width="170" height="220" rx="8" fill="#1e3a1e" stroke="#388e3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="182" text-anchor="middle" font-size="11" fill="#a5d6a7" font-weight="bold" letter-spacing="1">MAX485</text>
  <text x="465" y="196" text-anchor="middle" font-size="9"  fill="#66bb6a">RS485 Transceiver Module</text>

  <!-- IC chip on module -->
  <rect x="415" y="248" width="100" height="50" rx="3" fill="url(#chip)" stroke="#4a5568" stroke-width="1"/>
  <text x="465" y="270" text-anchor="middle" font-size="9"  fill="#90a4ae" font-weight="bold">MAX485 / SP485</text>
  <text x="465" y="285" text-anchor="middle" font-size="7"  fill="#546e7a">Half-duplex RS485</text>

  <!-- Left pins (logic side) -->
  <!-- VCC -->
  <rect x="378" y="215" width="20" height="10" rx="1" fill="#b71c1c" stroke="#e53935" stroke-width="0.5"/>
  <text x="376" y="223" text-anchor="end" font-size="8" fill="#ef9a9a">VCC</text>

  <!-- GND -->
  <rect x="378" y="230" width="20" height="10" rx="1" fill="#37474f" stroke="#546e7a" stroke-width="0.5"/>
  <text x="376" y="238" text-anchor="end" font-size="8" fill="#78909c">GND</text>

  <!-- DI (Data In = TX from ESP) -->
  <rect x="378" y="315" width="20" height="10" rx="1" fill="#e65100" stroke="#fb8c00" stroke-width="0.5"/>
  <text x="376" y="323" text-anchor="end" font-size="8" fill="#ffcc80">DI</text>

  <!-- DE -->
  <rect x="378" y="330" width="20" height="10" rx="1" fill="#1565c0" stroke="#1e88e5" stroke-width="0.5"/>
  <text x="376" y="338" text-anchor="end" font-size="8" fill="#90caf9">DE</text>

  <!-- RE (tied to DE) -->
  <rect x="378" y="345" width="20" height="10" rx="1" fill="#1565c0" stroke="#1e88e5" stroke-width="0.5"/>
  <text x="376" y="353" text-anchor="end" font-size="8" fill="#90caf9">RE̅</text>

  <!-- RO (Data Out = RX to ESP) -->
  <rect x="378" y="360" width="20" height="10" rx="1" fill="#4a148c" stroke="#7b1fa2" stroke-width="0.5"/>
  <text x="376" y="368" text-anchor="end" font-size="8" fill="#ce93d8">RO</text>

  <!-- Right pins (RS485 side) -->
  <!-- A (D+) -->
  <rect x="552" y="315" width="20" height="10" rx="1" fill="#c62828" stroke="#ef5350" stroke-width="0.5"/>
  <text x="574" y="323" font-size="8" fill="#ef9a9a">A (D+)</text>

  <!-- B (D-) -->
  <rect x="552" y="335" width="20" height="10" rx="1" fill="#01579b" stroke="#1e88e5" stroke-width="0.5"/>
  <text x="574" y="343" font-size="8" fill="#90caf9">B (D−)</text>

  <!-- DE–RE bridge label -->
  <text x="430" y="360" text-anchor="middle" font-size="8" fill="#ffd54f">⌒ bridged</text>

  <!-- ══════════════════════ WIRES ══════════════════════ -->

  <!-- 5V → VCC (red) -->
  <polyline points="82,175 82,150 340,150 340,220 378,220"
            fill="none" stroke="#e53935" stroke-width="2.5"/>
  <text x="200" y="145" text-anchor="middle" font-size="8" fill="#ef9a9a">5V</text>

  <!-- GND → GND (black/dark) -->
  <polyline points="82,160 82,140 350,140 350,235 378,235"
            fill="none" stroke="#546e7a" stroke-width="2.5"/>
  <text x="200" y="135" text-anchor="middle" font-size="8" fill="#90a4ae">GND</text>

  <!-- GPIO4 (TX) → DI (orange) -->
  <polyline points="82,375 82,490 355,490 355,320 378,320"
            fill="none" stroke="#fb8c00" stroke-width="2.5"/>
  <text x="220" y="485" text-anchor="middle" font-size="8" fill="#ffcc80">GPIO4 → DI  (TX)</text>

  <!-- GPIO2 → DE+RE (blue) -->
  <polyline points="82,305 82,510 365,510 365,335 378,335"
            fill="none" stroke="#1e88e5" stroke-width="2.5"/>
  <!-- also connects to RE -->
  <line x1="365" y1="350" x2="378" y2="350" stroke="#1e88e5" stroke-width="2.5"/>
  <text x="220" y="505" text-anchor="middle" font-size="8" fill="#90caf9">GPIO2 → DE+RE̅  (flow ctrl)</text>

  <!-- GPIO3 (RX) ← RO (purple) -->
  <polyline points="82,340 82,524 345,524 345,365 378,365"
            fill="none" stroke="#7b1fa2" stroke-width="2.5"/>
  <text x="220" y="519" text-anchor="middle" font-size="8" fill="#ce93d8">GPIO3 ← RO  (RX)</text>

  <!-- GND bottom also to GND on module (already covered above) -->

  <!-- ══════════════════════ RS485 BUS CABLE ══════════════════════ -->
  <!-- A (D+) line -->
  <line x1="572" y1="320" x2="730" y2="320" stroke="#c62828" stroke-width="3"/>
  <!-- B (D-) line -->
  <line x1="572" y1="340" x2="730" y2="340" stroke="#01579b" stroke-width="3"/>

  <!-- Twisted pair hint -->
  <text x="650" y="310" text-anchor="middle" font-size="8" fill="#78909c">RS485 bus</text>
  <!-- Small twist marks -->
  <path d="M610,322 Q620,316 630,322 Q640,328 650,322 Q660,316 670,322 Q680,328 690,322 Q700,316 710,322"
        fill="none" stroke="#546e7a" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- ══════════════════════ MR-12 Terminal ══════════════════════ -->
  <rect x="730" y="210" width="145" height="180" rx="8" fill="url(#terminal)" stroke="#8d6e63" stroke-width="2" filter="url(#shadow)"/>
  <text x="803" y="232" text-anchor="middle" font-size="11" fill="#d7ccc8" font-weight="bold" letter-spacing="1">SCHNEID MR-12</text>
  <text x="803" y="246" text-anchor="middle" font-size="9"  fill="#a1887f">Modbus RTU Slave</text>
  <text x="803" y="259" text-anchor="middle" font-size="8"  fill="#78909c">Addr 0x01 · 19200 Bd</text>

  <!-- Terminal blocks -->
  <rect x="748" y="270" width="30" height="50" rx="3" fill="#1a1a1a" stroke="#546e7a" stroke-width="1"/>
  <rect x="752" y="275" width="22" height="12" rx="2" fill="#263238" stroke="#37474f" stroke-width="0.5"/>
  <text x="763" y="285" text-anchor="middle" font-size="7" fill="#90a4ae">A</text>
  <rect x="752" y="292" width="22" height="12" rx="2" fill="#263238" stroke="#37474f" stroke-width="0.5"/>
  <text x="763" y="302" text-anchor="middle" font-size="7" fill="#90a4ae">B</text>
  <rect x="752" y="309" width="22" height="8" rx="2" fill="#37474f" stroke="#546e7a" stroke-width="0.5"/>
  <text x="763" y="316" text-anchor="middle" font-size="7" fill="#78909c">⏚</text>

  <text x="790" y="282" font-size="9" fill="#ef9a9a" font-weight="bold">D+ (A)</text>
  <text x="790" y="303" font-size="9" fill="#90caf9" font-weight="bold">D− (B)</text>
  <text x="790" y="319" font-size="9" fill="#78909c">Shield/GND</text>

  <!-- Wire connections into terminals -->
  <line x1="730" y1="320" x2="752" y2="281" stroke="#c62828" stroke-width="3"/>
  <line x1="730" y1="340" x2="752" y2="298" stroke="#01579b" stroke-width="3"/>

  <!-- MR-12 info box -->
  <rect x="748" y="335" width="112" height="45" rx="4" fill="#263238" stroke="#37474f" stroke-width="1"/>
  <text x="804" y="349" text-anchor="middle" font-size="8" fill="#78909c">8N1 · max 120 Ω</text>
  <text x="804" y="362" text-anchor="middle" font-size="8" fill="#78909c">termination resistor</text>
  <text x="804" y="375" text-anchor="middle" font-size="8" fill="#546e7a">at cable ends</text>

  <!-- ══════════════════════ LEGEND ══════════════════════ -->
  <rect x="60" y="490" width="620" height="58" rx="8" fill="#0d1321" stroke="#1f2940" stroke-width="1"/>
  <text x="80" y="508" font-size="9" fill="#546e7a" font-weight="bold" letter-spacing="1">VERBINDUNGEN</text>

  <line x1="80"  y1="522" x2="110" y2="522" stroke="#e53935" stroke-width="2.5"/>
  <text x="115" y="526" font-size="9" fill="#ef9a9a">5V  →  VCC</text>

  <line x1="200" y1="522" x2="230" y2="522" stroke="#546e7a" stroke-width="2.5"/>
  <text x="235" y="526" font-size="9" fill="#90a4ae">GND  →  GND</text>

  <line x1="320" y1="522" x2="350" y2="522" stroke="#fb8c00" stroke-width="2.5"/>
  <text x="355" y="526" font-size="9" fill="#ffcc80">GPIO4  →  DI</text>

  <line x1="80"  y1="540" x2="110" y2="540" stroke="#7b1fa2" stroke-width="2.5"/>
  <text x="115" y="544" font-size="9" fill="#ce93d8">GPIO3  ←  RO</text>

  <line x1="200" y1="540" x2="230" y2="540" stroke="#1e88e5" stroke-width="2.5"/>
  <text x="235" y="544" font-size="9" fill="#90caf9">GPIO2  →  DE + RE̅  (bridged)</text>

  <line x1="450" y1="540" x2="480" y2="540" stroke="#c62828" stroke-width="2.5"/>
  <text x="485" y="544" font-size="9" fill="#ef9a9a">A (D+)  →  MR-12 A</text>

  <line x1="450" y1="522" x2="480" y2="522" stroke="#01579b" stroke-width="2.5"/>
  <text x="485" y="526" font-size="9" fill="#90caf9">B (D−)  →  MR-12 B</text>

</svg>
