# ──────────────────────────────────────────────────────────────────────────────
# Fernwärme MR-12 – Custom Lovelace Card – Beispiel-Konfiguration
# ──────────────────────────────────────────────────────────────────────────────
#
# INSTALLATION
# ────────────
# 1. Datei kopieren:
#      schneid-mr12-card.js  →  <ha-config>/www/schneid-mr12-card.js
#
# 2. Als Ressource registrieren:
#      HA → Einstellungen → Dashboards → ⋮ (oben rechts) → Ressourcen
#      → + Ressource hinzufügen
#        URL:  /local/schneid-mr12-card.js
#        Typ:  JavaScript-Modul
#
# 3. HA neu laden (Entwicklerwerkzeuge → YAML neu laden) oder Browser-Cache leeren.
#
# 4. Karte zu einem Dashboard hinzufügen (Roher YAML-Editor):

# ──────────────────────────────────────────────────────────────────────────────
# Minimale Konfiguration (alle Defaults)
# ──────────────────────────────────────────────────────────────────────────────
type: custom:schneid-mr12-card

# ──────────────────────────────────────────────────────────────────────────────
# Vollständige Konfiguration mit allen optionalen Parametern
# ──────────────────────────────────────────────────────────────────────────────
# type: custom:schneid-mr12-card
# title: Fernwärme Übergabestation   # Kartenüberschrift (optional)
# entity_prefix: heating_schneid_mr_12  # Präfix der HA-Entities (optional)

